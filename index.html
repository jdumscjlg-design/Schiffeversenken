<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Schiffe Versenken - Tracker</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --water: #0284c7;
      --hit: #ef4444;
      --ship: #475569;
      --sunk: #111827;
      --grid-border: #475569;
      --label-color: #38bdf8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      margin: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
    }

    h1 {
      font-size: 1.2rem;
      margin: 5px 0 10px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Schiffsübersicht */
    .flotte-info {
      background-color: var(--card-bg);
      border: 1px solid var(--grid-border);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 12px;
      width: 100%;
      max-width: 420px;
    }

    .flotte-title {
      font-size: 0.8rem;
      font-weight: bold;
      color: #94a3b8;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .flotte-list {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .flotte-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .board-container {
      width: 100%;
      max-width: 420px;
      margin-bottom: 16px;
    }

    .board-title {
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 6px;
      color: #94a3b8;
    }

    /* Raster mit Koordinaten-Labels (11x11 Grid) */
    .grid-wrapper {
      display: grid;
      grid-template-columns: 24px repeat(10, 1fr);
      grid-template-rows: 24px repeat(10, 1fr);
      gap: 2px;
      background-color: var(--grid-border);
      padding: 3px;
      border-radius: 8px;
    }

    /* Beschriftungen (A-J / 1-10) */
    .label {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: bold;
      color: var(--label-color);
      background-color: var(--bg-color);
      border-radius: 2px;
    }

    /* Spielfeld-Zellen */
    .cell {
      aspect-ratio: 1;
      background-color: var(--card-bg);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
    }

    /* Zustände */
    .cell.ship {
      background-color: #64748b;
      border: 2px solid #cbd5e1;
      color: white;
    }

    .cell.water {
      background-color: var(--water);
      color: white;
    }

    .cell.hit {
      background-color: var(--hit);
      color: white;
      font-size: 1.1rem;
    }

    .cell.sunk {
      background-color: var(--sunk);
      color: #ef4444;
      border: 1px solid #ef4444;
      font-size: 1.1rem;
    }

    .legend {
      display: flex;
      gap: 12px;
      font-size: 0.75rem;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 2px;
    }

    .reset-btn {
      margin-top: 5px;
      margin-bottom: 20px;
      padding: 10px 24px;
      background-color: #334155;
      color: white;
      border: 1px solid var(--grid-border);
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🚢 Schiffe Versenken Tracker</h1>

  <!-- Übersicht Schiffsflotte -->
  <div class="flotte-info">
    <div class="flotte-title">⚓ Flotten-Übersicht</div>
    <div class="flotte-list">
      <div class="flotte-item">🚢 1x 5er</div>
      <div class="flotte-item">🛳️ 2x 4er</div>
      <div class="flotte-item">⛵ 3x 3er</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:#64748b; border: 1px solid #cbd5e1"></div> Schiff</div>
    <div class="legend-item"><div class="dot" style="background:#0284c7"></div> Wasser</div>
    <div class="legend-item"><div class="dot" style="background:#ef4444"></div> Treffer</div>
    <div class="legend-item"><div class="dot" style="background:#111827; border: 1px solid #ef4444"></div> Versenkt</div>
  </div>

  <!-- Spielfeld 1: Eigene Schüsse auf den Gegner -->
  <div class="board-container">
    <div class="board-title">🎯 MEINE SCHÜSSE (Gegner-Feld)</div>
    <div class="grid-wrapper" id="grid-enemy"></div>
  </div>

  <!-- Spielfeld 2: Eigene Flotte -->
  <div class="board-container">
    <div class="board-title">🛡️ MEINE FLOTTE (Eigenes Feld)</div>
    <div class="grid-wrapper" id="grid-own"></div>
  </div>

  <button class="reset-btn" onclick="resetBoards()">Neu starten</button>

  <script>
    const columns = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];

    function createBoard(gridId) {
      const grid = document.getElementById(gridId);
      grid.innerHTML = '';
      
      // 1. Ecke oben links (leer)
      const emptyCorner = document.createElement('div');
      emptyCorner.classList.add('label');
      grid.appendChild(emptyCorner);

      // 2. Spalten-Beschriftung (A bis J)
      for (let c = 0; c < 10; c++) {
        const colLabel = document.createElement('div');
        colLabel.classList.add('label');
        colLabel.innerText = columns[c];
        grid.appendChild(colLabel);
      }

      // 3. Zeilen + Spielfeldzellen erstellen
      for (let r = 1; r <= 10; r++) {
        // Zeilen-Label (1 bis 10)
        const rowLabel = document.createElement('div');
        rowLabel.classList.add('label');
        rowLabel.innerText = r;
        grid.appendChild(rowLabel);

        // 10 Felder pro Zeile
        for (let c = 0; c < 10; c++) {
          const cell = document.createElement('div');
          cell.classList.add('cell');
          cell.dataset.state = 'empty';

          let pressTimer;
          let isLongPress = false;

          // Lange Halten: Schiff / Versenkt markieren
          const startPress = () => {
            isLongPress = false;
            pressTimer = setTimeout(() => {
              isLongPress = true;
              const currentState = cell.dataset.state;
              
              if (gridId === 'grid-own') {
                if (currentState !== 'ship') {
                  setState(cell, 'ship');
                } else {
                  setState(cell, 'empty');
                }
              } else {
                if (currentState !== 'sunk') {
                  setState(cell, 'sunk');
                } else {
                  setState(cell, 'empty');
                }
              }
            }, 500);
          };

          const cancelPress = () => {
            clearTimeout(pressTimer);
          };

          // Normaler Klick
          const handleClick = () => {
            clearTimeout(pressTimer);
            if (isLongPress) return;

            const currentState = cell.dataset.state;

            if (currentState === 'empty' || currentState === 'ship') {
              setState(cell, 'water');
            } else if (currentState === 'water') {
              setState(cell, 'hit');
            } else {
              setState(cell, 'empty');
            }
          };

          // Touch- und Maus-Events
          cell.addEventListener('mousedown', startPress);
          cell.addEventListener('touchstart', startPress, {passive: true});
          
          cell.addEventListener('mouseup', cancelPress);
          cell.addEventListener('touchend', cancelPress);
          cell.addEventListener('mouseleave', cancelPress);

          cell.addEventListener('click', handleClick);

          grid.appendChild(cell);
        }
      }
    }

    function setState(cell, state) {
      cell.dataset.state = state;
      cell.className = 'cell';

      if (state === 'ship') {
        cell.classList.add('ship');
        cell.innerText = '■';
      } else if (state === 'water') {
        cell.classList.add('water');
        cell.innerText = '~';
      } else if (state === 'hit') {
        cell.classList.add('hit');
        cell.innerText = '✕';
      } else if (state === 'sunk') {
        cell.classList.add('sunk');
        cell.innerText = '☠';
      } else {
        cell.innerText = '';
      }
    }

    function resetBoards() {
      if (confirm('Spielfelder wirklich zurücksetzen?')) {
        createBoard('grid-enemy');
        createBoard('grid-own');
      }
    }

    // Spielfelder initialisieren
    createBoard('grid-enemy');
    createBoard('grid-own');
  </script>
</body>
</html>
